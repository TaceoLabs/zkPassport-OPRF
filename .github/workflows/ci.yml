name: CI

on:
  push:
    branches:
      - main
    tags-ignore:
      - v*
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: FULL
  FOUNDRY_PROFILE: ci
  AWS_REGION: us-east-1
  AWS_ENDPOINT_URL: http://localhost:4566
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Rustfmt
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Build documentation
        run: cargo doc --workspace --all-features --no-deps

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Rust Tests
        run: cargo test --release --workspace --all-features

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - uses: foundry-rs/foundry-toolchain@v1
      - run: cd contracts && forge install && forge build
      - name: Run E2E Test
        run: bash run-setup.sh e2e-test

  # Aggregator job -- make this the single required check in branch protection.
  ci-success:
    name: CI success
    if: always()
    runs-on: ubuntu-latest
    needs: [lint, test, e2e]
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [[ "${{ needs.lint.result }}" != "success" \
             || "${{ needs.test.result }}" != "success" \
             || "${{ needs.e2e.result  }}" != "success" ]]; then
            echo "lint: ${{ needs.lint.result }}"
            echo "test: ${{ needs.test.result }}"
            echo "e2e:  ${{ needs.e2e.result  }}"
            exit 1
          fi
